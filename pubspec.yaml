name: cireng_mama_piya
description: "Aplikasi kasir dan manajemen pesanan UMKM Mama Piya"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.6
  flutter_dotenv: ^5.1.0
  flutter_riverpod: ^2.5.1
  intl: ^0.19.0
  fl_chart: ^0.68.0
  file_picker: ^8.0.0+1
  path: ^1.9.0
  camera: ^0.11.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#177A47"
  adaptive_icon_foreground: "assets/images/logo.png"
  web:
    generate: false